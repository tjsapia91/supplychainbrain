{% extends 'base.html' %}
{% block title %}Delete Vendor{% endblock %}
{% block content %}
<h2>Delete Vendor</h2>
<p>Are you sure you want to delete <strong>{{ vendor }}</strong>?</p>
<form method="post">
{% csrf_token %}
<button type="submit" class="btn btn-danger">Delete</button>
<a href="{% url 'vendors:vendor_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
