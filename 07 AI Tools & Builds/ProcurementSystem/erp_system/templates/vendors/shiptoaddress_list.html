{% extends 'base.html' %}
{% block title %}Ship To Addresses{% endblock %}
{% block content %}
<h2>Ship To Addresses</h2>
<a href="{% url 'vendors:shipto_create' %}" class="btn btn-primary">Add Address</a>
<table class="table mt-3">
<thead><tr><th>Name</th><th>City</th><th>Actions</th></tr></thead>
<tbody>
{% for addr in addresses %}
<tr><td>{{ addr.name }}</td><td>{{ addr.city }}</td><td><a href="{% url 'vendors:shipto_edit' addr.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a></td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
