{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{{ title }}</h2>
    <a href="{% url 'forecast_dashboard' %}" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Item</label>
                    <select name="item" class="form-select" required>
                        <option value="">-- Select Item --</option>
                        {% for choice in form.item.field.queryset %}
                        <option value="{{ choice.pk }}">{{ choice.item_no }} - {{ choice.description|truncatechars:40 }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Channel</label>
                    <select name="channel" class="form-select" required>
                        {% for val, label in form.channel.field.choices %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Month (first day)</label>
                    <input type="date" name="month" class="form-control" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">Forecast Qty</label>
                    <input type="number" name="forecast_qty" class="form-control" value="0" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Actual Qty</label>
                    <input type="number" name="actual_qty" class="form-control" value="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Source</label>
                    <input type="text" name="source" class="form-control" placeholder="SoStocked, Valogix, Manual...">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Forecast</button>
            <a href="{% url 'forecast_dashboard' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
