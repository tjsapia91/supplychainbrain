{% extends 'base.html' %}
{% block title %}Delete Item - Items{% endblock %}
{% block content %}
<h2>Delete Item</h2>
<p>Are you sure you want to delete <strong>{{ item }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'items:item_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
