{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Item Form - Items{% endblock %}
{% block content %}
<h2>{% if form.instance.pk %}Edit{% else %}Create{% endif %} Item</h2>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'items:item_list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
